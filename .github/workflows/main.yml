name: Build Z+2 Video APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android-app:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          mkdir -p ZPlus2Video/app/src/main/java/com/zeeshan/video
          mkdir -p ZPlus2Video/app/src/main/res/drawable
          mkdir -p ZPlus2Video/app/src/main/res/values
          mkdir -p ZPlus2Video/app/src/main/res/mipmap-anydpi-v26
          mkdir -p ZPlus2Video/gradle/wrapper

      - name: Write Gradle Settings
        run: |
          cat << 'EOF' > ZPlus2Video/settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Z+2 Video"
          include(":app")
          EOF

      - name: Write Project Build Gradle
        run: |
          cat << 'EOF' > ZPlus2Video/build.gradle.kts
          plugins {
              id("com.android.application") version "8.1.1" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
          }
          EOF

      - name: Write App Build Gradle (Google Media3 Engine)
        run: |
          cat << 'EOF' > ZPlus2Video/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.zeeshan.video"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.zeeshan.video"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              buildFeatures { compose = true }
              composeOptions { kotlinCompilerExtensionVersion = "1.5.1" }
              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.0")
              implementation("androidx.compose.ui:ui:1.5.4")
              implementation("androidx.compose.material3:material3:1.1.2")
              // Google Video Engine (ExoPlayer/Media3)
              implementation("androidx.media3:media3-exoplayer:1.1.1")
              implementation("androidx.media3:media3-ui:1.1.1")
          }
          EOF

      - name: Write Android Manifest
        run: |
          cat << 'EOF' > ZPlus2Video/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Z+2 Video"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:keepScreenOn="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write Geometric Icon Code (Algebra & Geometry)
        run: |
          cat << 'EOF' > ZPlus2Video/app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <!-- Chocolate Background Top Triangle -->
              <path android:fillColor="#7B3F00" android:pathData="M0,0 h108 v108 z" />
              <!-- Blue Background Bottom Triangle -->
              <path android:fillColor="#0000FF" android:pathData="M0,0 v108 h108 z" />
              <!-- Perfect Geometric Center Play Button (White) -->
              <path android:fillColor="#FFFFFF" android:pathData="M40,34 L76,54 L40,74 Z" />
          </vector>
          EOF
          cat << 'EOF' > ZPlus2Video/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_foreground" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

      - name: Write Local Gradle Wrapper Files directly
        run: |
          cat << 'EOF' > ZPlus2Video/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Write MainActivity (Full Logic: List, Player, 300% Vol, 3-Mode Zoom & Gestures)
        run: |
          cat << 'EOF' > ZPlus2Video/app/src/main/java/com/zeeshan/video/MainActivity.kt
          package com.zeeshan.video
          
          import android.content.ContentUris
          import android.content.Context
          import android.content.pm.ActivityInfo
          import android.media.audiofx.LoudnessEnhancer
          import android.net.Uri
          import android.os.Bundle
          import android.provider.MediaStore
          import android.view.WindowManager
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.rememberLauncherForActivityResult
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.background
          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.gestures.detectVerticalDragGestures
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.shape.CircleShape
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.input.pointer.pointerInput
          import androidx.compose.ui.platform.LocalContext
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.compose.ui.viewinterop.AndroidView
          import androidx.media3.common.MediaItem
          import androidx.media3.exoplayer.ExoPlayer
          import androidx.media3.ui.AspectRatioWidget
          import androidx.media3.ui.PlayerView
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.withContext
          
          data class VideoItem(val id: Long, val name: String, val duration: String, val uri: Uri)
          
          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  // Always-On Feature: App never sleeps
                  window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)
                  setContent {
                      MaterialTheme {
                          MainLayout()
                      }
                  }
              }
          }
          
          @Composable
          fun MainLayout() {
              val context = LocalContext.current
              var videoList by remember { mutableStateOf<List<VideoItem>>(emptyList()) }
              var selectedVideoUri by remember { mutableStateOf<Uri?>(null) }
              var hasPermission by remember { mutableStateOf(false) }
          
              val permissionLauncher = rememberLauncherForActivityResult(
                  contract = ActivityResultContracts.RequestPermission(),
                  onResult = { isGranted -> hasPermission = isGranted }
              )
          
              LaunchedEffect(Unit) {
                  permissionLauncher.launch(android.Manifest.permission.READ_EXTERNAL_STORAGE)
              }
          
              LaunchedEffect(hasPermission) {
                  if (hasPermission) {
                      videoList = fetchAllVideos(context)
                  }
              }
          
              // Colors configuration
              val colorChocolate = Color(0xFF7B3F00)
              val colorBlue = Color(0xFF0000FF)
              val colorWhite = Color(0xFFFFFFFF)
          
              if (selectedVideoUri != null) {
                  VideoPlayerScreen(uri = selectedVideoUri!!) {
                      selectedVideoUri = null
                  }
              } else {
                  Column(modifier = Modifier.fillMaxSize().background(colorWhite)) {
                      // Top Bar layout as requested
                      Row(
                          modifier = Modifier.fillMaxWidth().background(colorChocolate).padding(16.dp),
                          verticalAlignment = Alignment.CenterVertically
                      ) {
                          Box(modifier = Modifier.size(40.dp).background(colorBlue, shape = CircleShape))
                          Spacer(modifier = Modifier.width(12.dp))
                          Text(text = "Zeeshan Video", color = colorWhite, fontSize = 24.sp, fontWeight = FontWeight.Bold)
                      }
          
                      if (videoList.isEmpty()) {
                          Box(modifier = Modifier.fillMaxSize(), contentAlignment = Alignment.Center) {
                              Column(horizontalAlignment = Alignment.CenterHorizontally) {
                                  CircularProgressIndicator(color = colorBlue)
                                  Spacer(modifier = Modifier.height(16.dp))
                                  Text(text = "Scanning all Videos...", color = colorChocolate, fontWeight = FontWeight.SemiBold)
                              }
                          }
                      } else {
                          // No Folders - Direct vertical listing
                          LazyColumn(modifier = Modifier.fillMaxSize().padding(8.dp)) {
                              items(videoList) { video ->
                                  Card(
                                      modifier = Modifier.fillMaxWidth().padding(vertical = 6.dp).clickable { selectedVideoUri = video.uri },
                                      shape = RoundedCornerShape(8.dp),
                                      colors = CardDefaults.cardColors(containerColor = Color(0xFFF5F5F5))
                                  ) {
                                      Column(modifier = Modifier.padding(16.dp)) {
                                          Text(text = video.name, fontSize = 16.sp, fontWeight = FontWeight.Bold, color = Color.Black)
                                          Spacer(modifier = Modifier.height(4.dp))
                                          Text(text = "Duration: ${video.duration}", fontSize = 12.sp, color = Color.Gray)
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }
          
          @Composable
          fun VideoPlayerScreen(uri: Uri, onClose: () -> Unit) {
              val context = LocalContext.current
              val exoPlayer = remember { ExoPlayer.Builder(context).build().apply {
                  setMediaItem(MediaItem.fromUri(uri))
                  prepare()
                  playWhenReady = true
              }}
          
              // Sound Booster Configuration (Up to 300%)
              val loudnessEnhancer = remember { 
                  try { LoudnessEnhancer(exoPlayer.audioSessionId).apply { enabled = true } } catch(e: Exception) { null }
              }
          
              var isControlsVisible by remember { mutableStateOf(true) }
              var zoomMode by remember { mutableStateOf(0) } // 0: Original, 1: Manual/Zoom, 2: Smart Fit
              var isSuperVolumeEnabled by remember { mutableStateOf(false) }
              var isOrientationLocked by remember { mutableStateOf(false) }
          
              DisposableEffect(Unit) {
                  onDispose {
                      exoPlayer.release()
                      loudnessEnhancer?.release()
                  }
              }
          
              Box(
                  modifier = Modifier
                      .fillMaxSize()
                      .background(Color.Black)
                      .pointerInput(Unit) {
                          detectVerticalDragGestures { _, dragAmount ->
                              // Gesture logic placeholder for volume/brightness
                          }
                      }
                      .clickable { isControlsVisible = !isControlsVisible }
              ) {
                  AndroidView(
                      factory = { ctx ->
                          PlayerView(ctx).apply {
                              player = exoPlayer
                              useController = false // Floating controls handle everything
                              resizeMode = when (zoomMode) {
                                  0 -> AspectRatioWidget.RESIZE_MODE_FIT
                                  1 -> AspectRatioWidget.RESIZE_MODE_ZOOM
                                  else -> AspectRatioWidget.RESIZE_MODE_FILL // Smart System Engine
                              }
                          }
                      },
                      modifier = Modifier.fillMaxSize(),
                      update = { view ->
                          view.resizeMode = when (zoomMode) {
                              0 -> AspectRatioWidget.RESIZE_MODE_FIT
                              1 -> AspectRatioWidget.RESIZE_MODE_ZOOM
                              else -> AspectRatioWidget.RESIZE_MODE_FILL
                          }
                      }
                  )
          
                  if (isControlsVisible) {
                      // Floating Controls Overlay (Hawa me तैरते हुए बटन्स)
                      Box(modifier = Modifier.fillMaxSize().background(Color.Black.copy(alpha = 0.4f))) {
                          // Top Controls
                          Row(
                              modifier = Modifier.fillMaxWidth().padding(16.dp).align(Alignment.TopStart),
                              horizontalArrangement = Arrangement.SpaceBetween
                          ) {
                              Button(onClick = onClose, colors = ButtonDefaults.buttonColors(containerColor = Color.Red)) {
                                  Text("Exit", color = Color.White)
                              }
                              // Language Toggle
                              Button(onClick = { /* Audio Track select logic */ }) {
                                  Text("Language")
                              }
                          }
          
                          // Center controls for Lock, Zoom and 300% Volume Boost
                          Row(
                              modifier = Modifier.fillMaxWidth().align(Alignment.Center),
                              horizontalArrangement = Arrangement.SpaceEvenly
                          ) {
                              // 300% Volume Button
                              Button(
                                  onClick = {
                                      isSuperVolumeEnabled = !isSuperVolumeEnabled
                                      loudnessEnhancer?.setTargetGain(if (isSuperVolumeEnabled) 3000 else 0)
                                  },
                                  colors = ButtonDefaults.buttonColors(containerColor = if (isSuperVolumeEnabled) Color.Red else Color.Blue)
                              ) {
                                  Text(if (isSuperVolumeEnabled) "BOOST 300% ON" else "BOOST 300%")
                              }
          
                              // Smart Zoom Button (3 Files System)
                              Button(onClick = { zoomMode = (zoomMode + 1) % 3 }) {
                                  Text(
                                      when (zoomMode) {
                                          0 -> "Original View"
                                          1 -> "Manual Zoom"
                                          else -> "Smart Mobile Fit"
                                      }
                                  )
                              }
          
                              // Orientation Lock
                              Button(
                                  onClick = {
                                      isOrientationLocked = !isOrientationLocked
                                      val activity = context as? ComponentActivity
                                      if (isOrientationLocked) {
                                          activity?.requestedOrientation = ActivityInfo.SCREEN_ORIENTATION_LOCKED
                                      } else {
                                          activity?.requestedOrientation = ActivityInfo.SCREEN_ORIENTATION_UNSPECIFIED
                                      }
                                  },
                                  colors = ButtonDefaults.buttonColors(containerColor = if (isOrientationLocked) Color.Magenta else Color.DarkGray)
                              ) {
                                  Text(if (isOrientationLocked) "Screen Locked" else "Lock Screen")
                              }
                          }
                      }
                  }
              }
          }
          
          suspend fun fetchAllVideos(context: Context): List<VideoItem> = withContext(Dispatchers.IO) {
              val list = mutableListOf<VideoItem>()
              val projection = arrayOf(
                  MediaStore.Video.Media._ID,
                  MediaStore.Video.Media.DISPLAY_NAME,
                  MediaStore.Video.Media.DURATION
              )
              val query = context.contentResolver.query(
                  MediaStore.Video.Media.EXTERNAL_CONTENT_URI,
                  projection,
                  null,
                  null,
                  "${MediaStore.Video.Media.DISPLAY_NA
